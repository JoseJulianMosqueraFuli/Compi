services:
  db:
    image: postgres:16-alpine
    container_name: compi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: compi
      POSTGRES_PASSWORD: compi
      POSTGRES_DB: compi
    ports:
      - "5432:5432"
    volumes:
      - compi_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compi -d compi"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  compi_pgdata:
